{% include "sidebar.html" %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courses — SkillGap.in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #050505;
  --bg2:      #0d0d0d;
  --card:     rgba(255,255,255,0.03);
  --card-b:   rgba(255,255,255,0.07);
  --primary:  #ff6b00;
  --primary2: #ff8c38;
  --primary3: #ff4500;
  --txt:      #f0ede8;
  --txt2:     #9a9590;
  --txt3:     #5a5652;
  --sidebar-w: 260px;
  --radius:   14px;
  --radius-lg: 20px;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--txt);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px; line-height: 1.65; overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.025; pointer-events: none; z-index: 9999;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--primary3); border-radius: 2px; }

.sidebar {
  width: var(--sidebar-w); height: 100vh;
  position: fixed; top: 0; left: 0;
  background: rgba(13,13,13,0.6);
  backdrop-filter: blur(28px) saturate(1.4);
  -webkit-backdrop-filter: blur(28px) saturate(1.4);
  border-right: 1px solid rgba(255,107,0,0.1);
  padding: 32px 24px; display: flex; flex-direction: column; gap: 8px;
  z-index: 100; transform-style: preserve-3d; perspective: 800px; overflow: hidden;
}
.sidebar::before {
  content: ''; position: absolute; top: -60%; left: -40%; width: 180%; height: 180%;
  background: radial-gradient(ellipse at 30% 40%, rgba(255,107,0,0.06), transparent 60%);
  pointer-events: none;
}
.sidebar-logo { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.sidebar-logo h1 {
  font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--primary), var(--primary2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.sidebar-logo span { font-size: 11px; color: var(--txt3); font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-top: 2px; }
.nav-section { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--txt3); padding: 12px 0 4px; }
.sidebar a {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  text-decoration: none; color: var(--txt2); font-size: 13.5px; font-weight: 500;
  border-radius: 10px; transition: all 0.2s ease; border: 1px solid transparent;
}
.sidebar a:hover, .sidebar a.active { background: rgba(255,107,0,0.08); color: var(--txt); border-color: rgba(255,107,0,0.15); }
.sidebar a.active { background: rgba(255,107,0,0.12); color: var(--primary2); }
.sidebar a .nav-icon { width: 18px; height: 18px; opacity: 0.6; flex-shrink: 0; }
.sidebar a:hover .nav-icon, .sidebar a.active .nav-icon { opacity: 1; }
.sidebar-footer { margin-top: auto; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 11.5px; color: var(--txt3); }

.main { margin-left: var(--sidebar-w); padding: 40px 44px; min-height: 100vh; max-width: calc(var(--sidebar-w) + 900px); }

.page-header { margin-bottom: 36px; }
.page-header .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--primary); margin-bottom: 6px; }
.page-header h2 { font-size: 30px; font-weight: 800; letter-spacing: -0.6px; color: var(--txt); }
.page-header h2 .accent { color: var(--primary); }

/* ── CARD WRAPPER ── */
.card {
  background: var(--card); border: 1px solid var(--card-b);
  border-radius: var(--radius-lg); padding: 24px 28px;
  margin-bottom: 20px; position: relative; overflow: hidden;
  transition: border-color 0.3s ease;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,107,0,0.3), transparent);
  opacity: 0; transition: opacity 0.3s ease;
}
.card:hover { border-color: rgba(255,107,0,0.2); }
.card:hover::before { opacity: 1; }
.card-title {
  font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--txt3); margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
}
.card-title::before { content: ''; display: block; width: 14px; height: 2px; background: var(--primary); border-radius: 1px; }

/* ── COURSE ITEM ── */
.course-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius); margin-bottom: 10px;
  transition: background 0.2s, border-color 0.2s, transform 0.25s;
  position: relative; overflow: hidden;
}
.course-item::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--primary); border-radius: 2px;
  transform: scaleY(0); transition: transform 0.25s ease;
}
.course-item:hover {
  background: rgba(255,107,0,0.04);
  border-color: rgba(255,107,0,0.18);
  transform: translateX(6px);
}
.course-item:hover::before { transform: scaleY(1); }

.course-info { flex: 1; }
.course-title { font-size: 14px; font-weight: 700; color: var(--txt); margin-bottom: 4px; }
.course-platform {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11.5px; font-weight: 600; color: var(--primary2);
  background: rgba(255,107,0,0.08); border: 1px solid rgba(255,107,0,0.15);
  border-radius: 6px; padding: 2px 8px;
}

.btn-open {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 8px 16px;
  background: rgba(255,107,0,0.1); border: 1px solid rgba(255,107,0,0.22);
  border-radius: 9px; color: var(--primary2);
  text-decoration: none; font-size: 12.5px; font-weight: 700;
  transition: background 0.2s, color 0.2s, transform 0.15s, box-shadow 0.2s;
  white-space: nowrap; flex-shrink: 0; margin-left: 16px;
}
.btn-open:hover {
  background: var(--primary); color: #fff;
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(255,107,0,0.3);
}

/* ── COUNTER STRIP ── */
.counter-strip {
  display: flex; gap: 16px; margin-bottom: 24px;
}
.counter-pill {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 18px;
  background: var(--card); border: 1px solid var(--card-b);
  border-radius: 12px; font-size: 13px; font-weight: 600; color: var(--txt2);
}
.counter-pill strong { font-size: 20px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }

/* ── DANCING LETTERS ── */
.dance-letter { display: inline-block; cursor: default; transform-origin: bottom center; }
.reveal { opacity: 0; transform: translateY(22px); }

#cursor-glow {
  position: fixed; width: 320px; height: 320px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,107,0,0.05) 0%, transparent 70%);
  pointer-events: none; z-index: 1; transform: translate(-50%,-50%);
}
.particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.particle  { position: absolute; width: 1px; height: 1px; background: var(--primary); border-radius: 50%; opacity: 0; }

@media (max-width: 900px) {
  .sidebar { transform: translateX(-100%); }
  .main { margin-left: 0; padding: 28px 20px; }
  .counter-strip { flex-wrap: wrap; }
}
</style>
</head>
<body>

<div id="cursor-glow"></div>
<div class="particles" id="particles"></div>

{% include "sidebar.html" %}

<main class="main">

  <div class="page-header reveal">
    <div class="eyebrow">Learning Hub</div>
    <h2><span class="dance-target">Matched <span class="accent">Courses</span></span></h2>
  </div>

  <!-- Quick stats strip -->
  <div class="counter-strip reveal">
    <div class="counter-pill">
      <strong>{{ courses|length }}</strong> courses found
    </div>
    <div class="counter-pill">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      Matched to your gaps
    </div>
  </div>

  <div class="card reveal">
    <div class="card-title">Your Learning Path</div>

    {% for c in courses %}
    <div class="course-item">
      <div class="course-info">
        <div class="course-title dance-target">{{ c.title }}</div>
        <span class="course-platform">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/></svg>
          {{ c.platform }}
        </span>
      </div>
      <a href="{{ c.link }}" target="_blank" class="btn-open">
        Open
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
      </a>
    </div>
    {% endfor %}

  </div>

</main>

<script>
gsap.registerPlugin(ScrollTrigger);

const glow = document.getElementById('cursor-glow');
document.addEventListener('mousemove', e => {
  gsap.to(glow, { x: e.clientX, y: e.clientY, duration: 0.5, ease: 'power2.out' });
});

const sidebar = document.getElementById('sidebar');
document.addEventListener('mousemove', e => {
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  gsap.to(sidebar, {
    rotateX: ((e.clientY - cy) / cy) * 3.5,
    rotateY: ((e.clientX - cx) / cx) * -2.5,
    duration: 1.2, ease: 'power2.out', transformPerspective: 900
  });
});

function makeDance(el) {
  const text = el.textContent;
  el.innerHTML = '';
  [...text].forEach(ch => {
    const span = document.createElement('span');
    span.className = 'dance-letter';
    span.textContent = ch === ' ' ? '\u00A0' : ch;
    el.appendChild(span);
  });
  el.addEventListener('mouseenter', () => {
    el.querySelectorAll('.dance-letter').forEach((l, i) => {
      gsap.fromTo(l,
        { y: 0, rotateZ: 0, scale: 1 },
        { y: -10, rotateZ: gsap.utils.random(-18,18), scale: gsap.utils.random(1.05,1.18),
          duration: 0.35, delay: i * 0.03, ease: 'back.out(2)', yoyo: true, repeat: 1 }
      );
    });
  });
}
document.querySelectorAll('.dance-target').forEach(makeDance);

gsap.utils.toArray('.reveal').forEach((el, i) => {
  gsap.fromTo(el, { opacity: 0, y: 28 },
    { opacity: 1, y: 0, duration: 0.7, delay: i * 0.06, ease: 'power3.out',
      scrollTrigger: { trigger: el, start: 'top 88%', toggleActions: 'play none none none' } }
  );
});

gsap.fromTo('.course-item',
  { opacity: 0, x: -14 },
  { opacity: 1, x: 0, stagger: 0.07, duration: 0.55, ease: 'power3.out', delay: 0.4,
    scrollTrigger: { trigger: '.course-item', start: 'top 88%' } }
);

gsap.fromTo('.sidebar a',
  { opacity: 0, x: -18 },
  { opacity: 1, x: 0, stagger: 0.07, duration: 0.5, ease: 'power3.out', delay: 0.2 }
);

(function() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top  = Math.random() * 100 + '%';
    container.appendChild(p);
    gsap.to(p, {
      opacity: 0.5 + Math.random() * 0.5, scale: 2 + Math.random() * 4,
      y: '-=' + (60 + Math.random() * 120), x: (Math.random() - 0.5) * 80,
      duration: 4 + Math.random() * 8, delay: Math.random() * 6,
      repeat: -1, yoyo: true, ease: 'sine.inOut'
    });
  }
})();
</script>

</body>
</html>
